<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts Progress</title>
</head>

<body>
    <div class="content" style="display: flex; margin: 100px;">
        <div class="buttons" style="display: flex; flex-direction: column; padding: 30px;">

            {% for script in scripts %}
            <button type="button" class="showButton" data-script-id="{{ loop.index - 1 }}">
                Show Script {{ loop.index - 1 }}
            </button>
            {% endfor %}

            <button type="button" id="clearButton">Clear</button>
        </div>

        <div id="table" class="table">
            <table>
                <thead>
                    <th style="width: 300px; text-align: left;">Timestamp</th>
                    <th style="width: 600px; text-align: left;">Event</th>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        function renderEvents(events) {
            const fragment = document.createDocumentFragment(); // batch DOM writes

            events.forEach((event, _) => {
                const [timestamp, log] = event.split(",");

                const tr = document.createElement("tr");

                const td1 = document.createElement("td");
                td1.textContent = timestamp;

                const td2 = document.createElement("td");
                td2.textContent = log;

                tr.appendChild(td1);
                tr.appendChild(td2);
                fragment.appendChild(tr);
            });
            document.getElementById("tableBody").appendChild(fragment);
        }



        let intervalId = null;
        let state = -1;
        let start = 0;
        async function poll() {
            console.log("polling '/poll/" + state + "?start=" + start + "'");

            if (state === -1) return;

            const response = await fetch("/poll/" + state + "?start=" + start);
            const result = await response.json();

            start = result.end;
            renderEvents(result.events);
        }


        document.querySelectorAll(".showButton").forEach(btn => {
            btn.addEventListener("click", async function (event) {

                // console.log("Show button with Script ID: " + btn.dataset.scriptId + " clicked!");

                event.preventDefault();
                if (state !== btn.dataset.scriptId) {
                    // console.log("change state to " + btn.dataset.scriptId + "?start=" + start + "'");
                    document.getElementById("tableBody").textContent = "";
                    state = btn.dataset.scriptId;
                    start = 0;

                    poll(); // initial poll

                    // check if the script is running
                    const response = await fetch("/worker-status/" + state);
                    const result = await response.json();
                    if (result.status === 0) {
                        clearInterval(intervalId);
                        intervalId = setInterval(poll, 1000);
                    }
                }
            });
        });


        document.getElementById("clearButton").addEventListener("click", async function (event) {
            console.log("Clear button clicked!");

            event.preventDefault();
            if (state !== -1) {
                document.getElementById("tableBody").textContent = "";
                state = -1;
                start = 0;
                
                clearInterval(intervalId);
                intervalId = null;
            }
        });
    </script>
</body>

</html>
