<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts Progress</title>

    <style>
        body {
            background-color: black;
            margin-left: 100px;
            margin-right: 100px;
            margin-top: 50px;
            color: white;
        }

        .content {
            display: flex;
        }

        .events {
            background-color: #18181b;
            width: 400px;
            height: 600px;
            border-radius: 30px;
            margin: 10px;
            padding: 30px;
            color: white;
        }

        .logs {
            background-color: #18181b;
            width: 800px;
            height: 600px;
            margin: 10px;
            padding: 30px;
            font-size: x-large;
            overflow-y: scroll;
        }

        .card {
            background-color: grey;
            border-radius: 30px;
            padding: 20px;
        }

        .card h2 {
            margin: 0px;
        }

        .buttons {
            display: flex;
        }

        table {
            overflow-y: auto;
            text-align: left;
        }
    </style>
</head>

<body>
    <h1>Scripts Progress</h1>

    <div class="content">
        <!-- List of events/scripts -->
        <div class="events">
            <h1>Events</h1>

            {% for event in events %}
            <div class="card">
                <h2>{{ event.name }}</h2>
                <p>{{ event.description }}</p>

                <div class="buttons">
                    <form method="post" id="startForm">
                        <button type="submit" id="startButton">Start</button>
                    </form>

                    <form method="post" id="stopForm">
                        <button type="submit" id="stopButton">Stop</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- Logs -->
        <div class="logs">
            <table>
                <thead>
                    <tr>
                        <th style="width: 300px;">Timestamp</th>
                        <th style="width: 600px;">Event</th>
                    </tr>
                </thead>
                <tbody id="eventBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let learn_update;
        document.getElementById("startForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            // startButton = document.getElementById("startButton");
            // startButton.disabled = true;
            
            // create ane Event Source
            learn_update = new EventSource("/stream");

            // listen on new messages
            learn_update.onmessage = function (e) {

                // check if ready
                if (e.data === "ready") {

                    // start the worker
                    fetch("/start-worker", {
                        method: "POST",
                    });
                    return;
                }
                
                // once closed, it needs to reopen to receive messages
                else if (e.data === "done") {
                    console.log("Received 'done'; closing Event Source");
                    learn_update.close();

                } else {
                    console.log("Received: " + e.data);

                    var timestamp = e.data.split(",")[0];
                    var log = e.data.split(",")[1];

                    var tableRow = document.createElement("tr");

                    var tableData1 = document.createElement("td");
                    tableData1.textContent = timestamp;
                    
                    var tableData2 = document.createElement("td");
                    tableData2.textContent = log;

                    tableRow.append(tableData1);
                    tableRow.append(tableData2);
                    document.getElementById("eventBody").prepend(tableRow);
                }
            };
        });

        document.getElementById("stopForm").addEventListener("submit", async function (event) {
            event.preventDefault();
            
            learn_update.close();
            
            const _ = await fetch("/stop-worker", {
                method: "POST",
            });
        });
    </script>
</body>

</html>
